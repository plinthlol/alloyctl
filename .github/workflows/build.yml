name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release'
        required: false
        type: boolean
        default: false
      tag_name:
        description: 'Release Tag Name (e.g. v0.1.0)'
        required: false
        type: string
        default: 'v0.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux AMD64 (Static build compatible with both GNU glibc & MUSL Linux distributions)
          - goos: linux
            goarch: amd64
            output_name: alloyctl-linux-amd64
          # Linux ARM64
          - goos: linux
            goarch: arm64
            output_name: alloyctl-linux-arm64
          # macOS Intel
          - goos: darwin
            goarch: amd64
            output_name: alloyctl-darwin-amd64
          # macOS Apple Silicon (M1/M2/M3/M4)
          - goos: darwin
            goarch: arm64
            output_name: alloyctl-darwin-arm64
          # Windows AMD64
          - goos: windows
            goarch: amd64
            output_name: alloyctl-windows-amd64.exe
          # Windows ARM64
          - goos: windows
            goarch: arm64
            output_name: alloyctl-windows-arm64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: Build Binary (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o dist/${{ matrix.output_name }} ./cmd/alloyctl

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display Artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != 'main' && github.ref_name || inputs.tag_name }}
          name: Release ${{ github.ref_name != 'main' && github.ref_name || inputs.tag_name }}
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
